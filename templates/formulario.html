{% extends 'base.html'%}
{% block contenido %}
    <!-- SECCIÓN INICIO -->
   <section id="contacto" class="contacto">
        <div class="container form-container">
            <h2>Contacto</h2>
            <div class="divider"></div>
            <p>¿Tienes dudas, sugerencias o pedidos especiales? Escríbenos.</p>
            
            <form class="contact-form" action="/registro" method="POST">
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" name="name" id="name" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" name="email" id="email" placeholder="tu@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea name="message" id="message" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar Mensaje</button>
            </form>
        </div>
    </section>

    <!-- SECCIÓN PRODUCTOS -->
    
            {%endblock%}
